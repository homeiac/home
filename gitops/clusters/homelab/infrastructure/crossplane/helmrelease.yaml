apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crossplane
  namespace: crossplane-system
spec:
  # Re-enabled 2026-03-01 with safeguards:
  # - CPU limit 1 core on provider pod (was unbounded → 200%+)
  # - --max-reconcile-rate=1 (was default 100/sec)
  # - --poll=30m (drift check interval)
  # - All managed resources paused in git (staged unpause)
  # - CrossplaneProviderHighCPU alert at 80% for 10m
  # Emergency: set suspend: true to kill immediately
  suspend: false
  interval: 5m
  install:
    createNamespace: true
  chart:
    spec:
      chart: crossplane
      version: "1.18.2"  # Latest stable as of Dec 2025
      sourceRef:
        kind: HelmRepository
        name: crossplane
        namespace: flux-system
  values:
    # Resource limits for homelab
    resourcesCrossplane:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi
    resourcesRBACManager:
      limits:
        cpu: 100m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 128Mi
